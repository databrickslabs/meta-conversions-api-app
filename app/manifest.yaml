version: 1

name: meta-conversions-api-app
description: |
  Guided companion app for the Meta Conversions API Marketplace listing.
  Gives Meta's advertiser customers a UI-driven way to send server-side
  conversion events from their Databricks Lakehouse to Meta's Conversions
  API (CAPI) — no SQL, notebooks, or manual secret management required.

user_api_scopes:
  - sql
  - sql.warehouses
  - catalog.catalogs:read
  - catalog.schemas:read
  - catalog.tables:read
  - files.files
